<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasa Açma Oyunu</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(400px) rotate(360deg); opacity: 0; }
        }
        @keyframes shine { 100% { left: 200%; } }
        .animate-fall { animation: fall 3s linear infinite; }
        .animate-shine { animation: shine 1s ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // İkonları Lucide kütüphanesinden alalım
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    lucide.createIcons({
                        targets: [iconRef.current]
                    });
                }
            }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
        };

        const WHEEL_OPTIONS = [
            ['Benim', 'Senin'],
            ['Baba', 'Anne', 'Dede'],
            ['-m', '-n', '-si']
        ];

        const LEVELS = [
            { id: 1, hintText: "Benim babam", target: [0, 0, 0], instruction: "Kasayı açmak için doğru kelimeleri birleştir: Benim babam." },
            { id: 2, hintText: "Senin annen", target: [1, 1, 1], instruction: "Kasayı açmak için doğru kelimeleri birleştir: Senin annen." }
        ];

        const Wheel = ({ options, selectedIndex, onChange }) => {
            const handleUp = () => onChange((selectedIndex - 1 + options.length) % options.length);
            const handleDown = () => onChange((selectedIndex + 1) % options.length);

            const prevIndex = (selectedIndex - 1 + options.length) % options.length;
            const nextIndex = (selectedIndex + 1) % options.length;

            return (
                <div className="relative w-24 md:w-28 h-48 bg-gradient-to-b from-gray-300 via-gray-100 to-gray-300 border-4 border-gray-500 rounded-xl shadow-inner flex flex-col items-center justify-between overflow-hidden">
                    <button onClick={handleUp} className="w-full h-10 flex justify-center items-center text-gray-600 hover:text-black z-20">
                        <Icon name="chevron-up" size={28} />
                    </button>
                    <div className="relative w-full flex-1 flex flex-col items-center justify-center">
                        <div className="absolute top-0 text-gray-400 font-bold text-lg opacity-60">{options[prevIndex]}</div>
                        <div className="absolute text-blue-800 font-extrabold text-xl md:text-2xl bg-white/50 w-full text-center py-1 border-y border-gray-300">
                            {options[selectedIndex]}
                        </div>
                        <div className="absolute bottom-0 text-gray-400 font-bold text-lg opacity-60">{options[nextIndex]}</div>
                    </div>
                    <button onClick={handleDown} className="w-full h-10 flex justify-center items-center text-gray-600 hover:text-black z-20">
                        <Icon name="chevron-down" size={28} />
                    </button>
                </div>
            );
        };

        function App() {
            const [levelIndex, setLevelIndex] = useState(0);
            const [selections, setSelections] = useState([0, 0, 0]);
            const [isUnlocked, setIsUnlocked] = useState(false);
            const [isError, setIsError] = useState(false);
            const [gameFinished, setGameFinished] = useState(false);

            const currentLevel = LEVELS[levelIndex];

            const speak = (text) => {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'tr-TR';
                window.speechSynthesis.speak(utterance);
            };

            useEffect(() => {
                if (!gameFinished && !isUnlocked) speak(currentLevel.instruction);
            }, [levelIndex, gameFinished]);

            const handleUnlockClick = () => {
                const isCorrect = selections.every((val, idx) => val === currentLevel.target[idx]);
                if (isCorrect) {
                    setIsUnlocked(true);
                    speak("Tebrikler! Kasa açıldı.");
                    setTimeout(() => {
                        if (levelIndex + 1 < LEVELS.length) {
                            setLevelIndex(prev => prev + 1);
                            setSelections([0, 0, 0]);
                            setIsUnlocked(false);
                        } else {
                            setGameFinished(true);
                            speak("Harika! Tüm kilitleri açtın.");
                        }
                    }, 4000);
                } else {
                    setIsError(true);
                    speak("Yanlış şifre.");
                    setTimeout(() => setIsError(false), 800);
                }
            };

            if (gameFinished) return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6 text-center">
                    <div className="bg-green-600 p-12 rounded-3xl shadow-2xl text-white">
                        <Icon name="check-circle-2" size={80} className="mx-auto mb-4" />
                        <h1 className="text-3xl font-bold mb-4">GÖREV TAMAMLANDI!</h1>
                        <button className="bg-white text-green-700 px-8 py-3 rounded-full font-bold text-xl">Videoya Devam Et</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-800 flex flex-col items-center justify-center p-4 font-sans select-none">
                    <div className="mb-6 flex items-center gap-4 bg-slate-700 p-4 rounded-2xl shadow-lg w-full max-w-xl">
                        <div className="w-14 h-14 bg-blue-500 rounded-full flex items-center justify-center border-4 border-white text-2xl">🤖</div>
                        <div className="flex-1">
                            <p className="text-blue-200 text-xs font-bold">Şifre İpucu ({levelIndex + 1}/2):</p>
                            <p className="text-white text-xl font-bold font-mono">"{currentLevel.hintText}"</p>
                        </div>
                        <button onClick={() => speak(currentLevel.instruction)} className="p-3 bg-slate-600 rounded-full text-white hover:bg-blue-500">
                            <Icon name="volume-2" size={24} />
                        </button>
                    </div>

                    <div className={`bg-slate-700 p-6 md:p-8 rounded-3xl border-8 border-slate-500 w-full max-w-2xl transition-all ${isError ? 'bg-red-900 border-red-500' : ''}`}>
                        <div className="bg-slate-900 rounded-xl p-6 flex justify-center items-center gap-4 min-h-[250px] relative overflow-hidden">
                            {isUnlocked ? (
                                <div className="text-center animate-bounce">
                                    <Icon name="image" size={64} className="text-white mx-auto mb-2 opacity-50" />
                                    <p className="text-white text-xl font-bold">Fotoğraf Bulundu!</p>
                                </div>
                            ) : (
                                <>
                                    <Wheel options={WHEEL_OPTIONS[0]} selectedIndex={selections[0]} onChange={v => {const n=[...selections]; n[0]=v; setSelections(n)}} />
                                    <span className="text-white text-2xl font-bold">+</span>
                                    <Wheel options={WHEEL_OPTIONS[1]} selectedIndex={selections[1]} onChange={v => {const n=[...selections]; n[1]=v; setSelections(n)}} />
                                    <span className="text-white text-2xl font-bold">+</span>
                                    <Wheel options={WHEEL_OPTIONS[2]} selectedIndex={selections[2]} onChange={v => {const n=[...selections]; n[2]=v; setSelections(n)}} />
                                </>
                            )}
                        </div>
                        <button onClick={handleUnlockClick} className="w-full mt-6 py-4 bg-yellow-500 hover:bg-yellow-400 text-yellow-950 rounded-full font-black text-2xl flex items-center justify-center gap-3">
                            <Icon name={isUnlocked ? "unlock" : "lock"} size={28} />
                            {isUnlocked ? "AÇILDI" : "KİLİDİ AÇ"}
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
